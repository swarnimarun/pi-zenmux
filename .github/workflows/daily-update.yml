# ──────────────────────────────────────────────
# Daily Model Update (CI)
# ──────────────────────────────────────────────
#
# Triggers:
#   - Schedule: 06:00 UTC every day
#   - Manual:   workflow_dispatch (Actions tab → "Run workflow")
#
# Steps:
#   1. Checkout repo, install deps (npm ci)
#   2. Regenerate models (scripts/generate-models.mjs)
#   3. If zenmux-models.generated.js changed:
#        a. Bump patch version (npm version patch)
#        b. Commit changes on a CI branch
#        c. Open or update a pull request
#   4. If no model changes → exit cleanly
# ──────────────────────────────────────────────

name: Daily Model Update

on:
  schedule:
    - cron: '0 6 * * *'     # 06:00 UTC daily
  workflow_dispatch:          # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-models:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Regenerate models
        run: npm run generate:models

      - name: Check for model changes
        id: diff
        run: |
          if git diff --quiet -- zenmux-models.generated.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[ok] No model changes — nothing to open."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[!] Model changes detected."
          fi

      - name: Bump version
        if: steps.diff.outputs.changed == 'true'
        run: npm version patch --no-git-tag-version

      - name: Check final diff
        if: steps.diff.outputs.changed == 'true'
        id: final_diff
        run: |
          if git diff --quiet -- zenmux-models.generated.js package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[ok] No final diff detected — skipping PR creation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[!] Final diff detected."
          fi

      - name: Capture version
        if: steps.final_diff.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        id: version

      - name: Create pull request
        if: steps.final_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update models (v${{ steps.version.outputs.version }}) [skip ci]"
          branch: ci/daily-model-update
          delete-branch: false
          title: "chore: update models (v${{ steps.version.outputs.version }})"
          body: |
            Automated daily model update generated by GitHub Actions.

            Changes included in this PR:
            - regenerated `zenmux-models.generated.js`
            - bumped package version in `package.json`
            - updated `package-lock.json`
          add-paths: |
            zenmux-models.generated.js
            package.json
            package-lock.json
